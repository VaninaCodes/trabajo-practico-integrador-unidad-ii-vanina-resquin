    <nav class="navbar navbar-expand-lg bg-body-tertiary">

        <a class="navbar-brand" href="index.html">
          <img

        <button
          class="navbar-toggler"

    <main>
      <!-- Contenedor main -->
      <div id="contenedor-main">
        <h2>

          <img
            src="assets/img/icono-flecha-abajo.png"
            alt="Flecha apuntando abajo"
          />
        </h2>

        <!-- = BOOTSTRAP : Autoplaying carousels = -->
        <div
          id="carouselExampleAutoplaying"
          class="carousel slide"
          data-bs-ride="carousel"
        >
          <div class="carousel-inner">
            <div class="carousel-item active">
              <a href="carreras.html"
                ><img
                  src="https://i.pinimg.com/originals/80/b1/cf/80b1cf27df714a3ba0da909fd3f3f221.gif"

            </div>
            <div class="carousel-item">
              <img
                src="https://i.pinimg.com/originals/2e/7c/05/2e7c058c9cfd7b4b05b18cf503a9bb59.gif"
                class="d-block w-100"
                alt="..."
              />
            </div>
            <div class="carousel-item">
              <img
                src="https://i.pinimg.com/originals/ab/49/53/ab49534a6e0af22bba8d9b24ce62a5d9.gif"
                class="d-block w-100"
                alt="..."
              />
            </div>
          </div>
          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
